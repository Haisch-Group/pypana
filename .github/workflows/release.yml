name: Release

on:
  push:
    tags: ["v*"]

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      prerelease: ${{ steps.check.outputs.prerelease }}
    steps:
      - uses: actions/checkout@v6.1.0
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v6.3.0
        with:
          python-version: "3.12"

      - name: Refuse to release a commit that is not on main
        run: |
          git fetch origin main:refs/remotes/origin/main
          if ! git merge-base --is-ancestor "$GITHUB_SHA" origin/main; then
            echo "::error::Tag $GITHUB_REF_NAME points at a commit that is not on main."
            exit 1
          fi
        env:
          GITHUB_REF_NAME: ${{ github.ref_name }}

      - name: Classify the tag
        id: check
        run: |
          pip install packaging
          python - <<'EOF' >> "$GITHUB_OUTPUT"
          import os
          from packaging.version import Version
          v = Version(os.environ["GITHUB_REF_NAME"].lstrip("v"))
          print(f"prerelease={str(v.is_prerelease).lower()}")
          EOF
        env:
          GITHUB_REF_NAME: ${{ github.ref_name }}

      - run: pip install build
      - run: python -m build
      - run: pipx run twine check --strict dist/*

      - name: Verify no local version identifier
        run: |
          if ls dist/ | grep -q '+'; then
            echo "::error::Local version identifier present - tag not visible or tree dirty."
            exit 1
          fi

      - uses: actions/upload-artifact@v4.6.2
        with:
          name: dist
          path: dist/

  test-install:
    needs: build
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.12", "3.13"]
    steps:
      - uses: actions/download-artifact@v4.2.1
        with: {name: dist, path: dist/}
      - uses: actions/setup-python@v6.3.0
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install the built wheel and import it
        shell: bash
        run: |
          pip install dist/*.whl
          python -c "import pypana; print(pypana.__version__)"

  testpypi:
    needs: [build, test-install]
    if: needs.build.outputs.prerelease == 'true'
    runs-on: ubuntu-latest
    environment: testpypi
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4.3.0
        with: {name: dist, path: dist/}
      - uses: pypa/gh-action-pypi-publish@ba38be9e461d3875417946c167d0b5f3d385a247  # 1.14.1
        with:
          repository-url: https://test.pypi.org/legacy/

  pypi:
    needs: [build, test-install]
    if: needs.build.outputs.prerelease == 'false'
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write
      contents: write
    steps:
      - uses: actions/download-artifact@v4.3.0
        with: {name: dist, path: dist/}
      - uses: pypa/gh-action-pypi-publish@ba38be9e461d3875417946c167d0b5f3d385a247  # 1.14.1
      - name: Create the GitHub release
        run: gh release create "$GITHUB_REF_NAME" dist/* --generate-notes
        env:
          GH_TOKEN: ${{ github.token }}
          GITHUB_REF_NAME: ${{ github.ref_name }}
